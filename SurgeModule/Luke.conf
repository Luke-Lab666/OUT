[General]
#仅供参考
# ================================
# Test / Connectivity
# ================================
proxy-test-url = http://latency-test.skk.moe/endpoint
proxy-test-udp = www.apple.com@64.6.64.6
internet-test-url = http://wifi.vivo.com.cn/generate_204
test-timeout = 5
# ================================
# Network / IPv6
# ================================
# 如无特殊需求不建议开启 IPv6，当前多数环境下 IPv6 只会增加排障复杂度
ipv6 = false
ipv6-vif = disabled

wifi-assist = false
all-hybrid = true

#以下建议关闭
include-all-networks = true
include-local-networks = true
include-apns = true
include-cellular-services = true
# ================================
# LAN / Local Access
# ================================
allow-wifi-access = false
proxy-restricted-to-lan = false
# ================================
# DNS
# ================================
dns-server = 223.6.6.6
encrypted-dns-server = https://你的加密dns

hijack-dns = *:53
encrypted-dns-follow-outbound-mode = false
encrypted-dns-skip-cert-verification = false
exclude-simple-hostnames = true
use-local-host-item-for-proxy = true
# ================================
# HTTP / UDP / QUIC
# ================================
udp-priority = true
udp-policy-not-supported-behaviour = REJECT
block-quic = all-proxy
# ================================
# API / Dashboard
# ================================
http-api-tls = true
http-api-web-dashboard = true
# ================================
# GeoIP
# ================================
geoip-maxmind-url = https://raw.githubusercontent.com/Luke-Lab666/ProxyKit/main/Rule/GeoIP-CN.mmdb
# ================================
# UI / Log
# ================================
show-error-page-for-reject = true
loglevel = warning
auto-suspend = false
# hide-vpn-icon = true

[Proxy Group]
# ================================
# Main Policy
# ================================
国际出口 = select, 香港, 台湾, 日本, 韩国, 英国, 新加坡, 美国, 德国, 加拿大, 澳大利亚, 亚洲, 欧洲, 南美洲, no-alert=0, hidden=0, include-all-proxies=0, icon-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Auto.png
# ================================
# App / Service Policy
# ================================
APNs = fallback, 香港简化, 日本简化, DIRECT, no-alert=1, hidden=0, include-all-proxies=0, policy-regex-filter=^(?!.*Premium).*(?:Hong Kong (?:01|03|05|10|14)|Japan (?:01|13|15|19|20)).*$, persistent=1, icon-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Apple.png
Apple = select, 香港, 日本, DIRECT, no-alert=0, hidden=0, include-all-proxies=0, icon-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Apple_1.png, persistent=0, policy-regex-filter=Hong Kong|Japan|Taiwan
AI = select, 美国, 日本, 台湾, 新加坡, 韩国, 加拿大, 德国, 英国, policy-regex-filter=US|USA|美国, no-alert=0, hidden=0, include-all-proxies=0, icon-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Puzzle.png
Outlook = select, DIRECT, 香港, 日本, no-alert=0, hidden=0, include-all-proxies=0, icon-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Mail.png
Telegram = select, no-alert=1, hidden=0, include-all-proxies=0, icon-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Telegram.png, persistent=1, policy-regex-filter=Hong Kong|Singapore|Taiwan, include-other-group=Nexitally
Magpie = select, DIRECT, 香港, 台湾, 美国, 韩国, 新加坡, policy-regex-filter=Hong Kong, no-alert=1, hidden=0, include-all-proxies=0, icon-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Emby.png, persistent=1
# ================================
# Region Policy
# ================================
香港 = select, update-interval=0, policy-regex-filter=Hong Kong|香港|HK, no-alert=1, hidden=0, include-all-proxies=0, include-other-group=Nexitally, icon-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Hong_Kong.png, persistent=1
台湾 = select, update-interval=0, policy-regex-filter=Taiwan|台湾|TW, no-alert=1, hidden=0, include-all-proxies=0, include-other-group=Nexitally, icon-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Taiwan.png, persistent=1
日本 = select, update-interval=0, policy-regex-filter=Japan|日本|JP, no-alert=1, hidden=0, include-all-proxies=0, include-other-group=Nexitally, icon-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Japan.png, persistent=1
韩国 = select, update-interval=0, policy-regex-filter=Korea, no-alert=1, hidden=0, include-all-proxies=0, include-other-group=Nexitally, icon-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Korea.png, persistent=1
新加坡 = select, update-interval=0, policy-regex-filter=Singapore|SG|新加坡, no-alert=1, hidden=0, include-all-proxies=0, include-other-group=Nexitally, icon-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Singapore.png
美国 = smart, update-interval=0, policy-regex-filter=USA|美国|US, no-alert=1, hidden=0, include-all-proxies=0, include-other-group=Nexitally, icon-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/United_States.png
英国 = select, update-interval=0, policy-regex-filter=United Kingdom, no-alert=1, hidden=0, include-all-proxies=0, include-other-group=Nexitally, icon-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/United_Kingdom.png
德国 = select, policy-regex-filter=Germany, no-alert=1, hidden=0, include-all-proxies=0, include-other-group=Nexitally, icon-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Germany.png
加拿大 = select, policy-regex-filter=Canada, no-alert=0, hidden=0, include-all-proxies=0, include-other-group=Nexitally, icon-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Canada.png
澳大利亚 = select, policy-regex-filter=Australia, no-alert=0, hidden=0, include-all-proxies=0, include-other-group=Nexitally, icon-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Australia.png
亚洲 = select, policy-regex-filter=India|Indonesia, no-alert=0, hidden=0, include-all-proxies=0, include-other-group=Nexitally, icon-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/World_Map.png
欧洲 = select, policy-regex-filter=Sweden|Bulgaria|Austria|Ireland|Turkey|Hungary, no-alert=0, hidden=0, include-all-proxies=0, include-other-group=Nexitally, icon-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/European_Union.png
南美洲 = select, policy-regex-filter=Brazil|Argentina|Chile, no-alert=0, hidden=0, include-all-proxies=0, include-other-group=Nexitally, icon-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/World_Map.png
# ================================
# Provider / Subscription
# ================================
Nexitally = select, policy-path=https://你的订阅链接, update-interval=-1, no-alert=0, hidden=0, include-all-proxies=0, icon-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/AmyTelecom.png, policy-regex-filter=^(?!.*Premium).*$
# ================================
# Hidden Smart Groups
# ================================
香港简化 = smart, policy-regex-filter=^(?!.*Premium).*Hong Kong (?:01|03|05|10|14).*$, no-alert=0, hidden=1, include-all-proxies=0, include-other-group=Nexitally
日本简化 = smart, policy-regex-filter=^(?!.*Premium).*Japan (?:01|13|15|19|20).*$, no-alert=0, hidden=1, include-all-proxies=0, include-other-group=Nexitally

[Rule]
# ================================
# Protocol
# ================================
PROTOCOL,STUN,REJECT
# ================================
# Apple / APNs
# ================================
RULE-SET,https://raw.githubusercontent.com/Luke-Lab666/ProxyKit/main/Rule/APNs,APNs,extended-matching
RULE-SET,https://raw.githubusercontent.com/Luke-Lab666/ProxyKit/refs/heads/main/Rule/AppleCN,DIRECT,extended-matching
RULE-SET,https://raw.githubusercontent.com/Luke-Lab666/ProxyKit/refs/heads/main/Rule/AppleFull,Apple
# ================================
# Network Info
# ================================
RULE-SET,https://raw.githubusercontent.com/Luke-Lab666/ProxyKit/refs/heads/main/Rule/Net-Info-D,DIRECT
RULE-SET,https://raw.githubusercontent.com/Luke-Lab666/ProxyKit/refs/heads/main/Rule/Net-Info-G,国际出口
# ================================
# Mail / AI / Telegram
# ================================
RULE-SET,https://raw.githubusercontent.com/Luke-Lab666/ProxyKit/main/Rule/Outlook,Outlook,extended-matching
RULE-SET,https://raw.githubusercontent.com/Luke-Lab666/ProxyKit/main/Rule/AGI,AI
RULE-SET,https://raw.githubusercontent.com/Luke-Lab666/ProxyKit/refs/heads/main/Rule/Telegram,Telegram
# ================================
# Private Media / Self-hosted
# ================================
DOMAIN-SUFFIX,example-private-1.com,Magpie,extended-matching
DOMAIN-SUFFIX,example-private-2.com,Magpie,extended-matching
DOMAIN,example-ddns.example.com,美国
# ================================
# LAN / Reject
# ================================
RULE-SET,https://raw.githubusercontent.com/Luke-Lab666/ProxyKit/main/Rule/LAN,DIRECT
RULE-SET,https://raw.githubusercontent.com/Luke-Lab666/ProxyKit/refs/heads/main/Rule/REJECT,REJECT,pre-matching,extended-matching
# ================================
# GeoIP / Final
# ================================
GEOIP,CN,DIRECT
FINAL,国际出口

[Header Rewrite]
# 解决 GitHub 速率限制返回 429 问题
http-request ^https:\/\/github\.com\/ header-replace Accept-Language en-us
http-request ^https:\/\/(raw|gist)\.githubusercontent\.com\/ header-replace Accept-Language en-us
[SSID Setting]
TYPE:CELLULAR tfo-behaviour=force-disabled, cellular-fallback=hybrid

[MITM]
h2 = true
hostname = %INSERT% -*.facebook.com, -*.instagram.com, -*.twitter.com, -*.snssdk.com, -*.pstatp.com