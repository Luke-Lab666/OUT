name: Deploy Pages

on:
  push:
    branches:
      - main
    paths:
      - "Rule/**"
      - "Scripts/**"
      - "SurgeModule/**"
      - "Calendar/**"
      - ".github/workflows/pages.yml"
      - ".github/workflows/update-calendar.yml"
  workflow_dispatch:
  workflow_run:
    workflows:
      - Update AGI Rule
      - Update Calendar
    types:
      - completed

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository without Node actions
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git init .
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --prune --no-tags origin "+refs/heads/main:refs/remotes/origin/main"
          git checkout -B main origin/main
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Render static page
        run: |
          set -euo pipefail
          rm -rf /tmp/proxykit-pages
          mkdir -p /tmp/proxykit-pages

          python3 <<'PY'
          import html
          import json
          import subprocess
          from pathlib import Path
          from string import Template
          from urllib.parse import quote

          OWNER = "Luke-Lab666"
          REPO = "ProxyKit"
          BRANCH = "main"
          RAW_BASE = f"https://raw.githubusercontent.com/{OWNER}/{REPO}/{BRANCH}/"
          GH_BASE = f"https://github.com/{OWNER}/{REPO}/blob/{BRANCH}/"

          CATEGORIES = [
              {"key": "Rule", "title": "规则", "icon": "R"},
              {"key": "Scripts", "title": "脚本", "icon": "JS"},
              {"key": "SurgeModule", "title": "模块", "icon": "M"},
          ]

          def quote_path(path: str) -> str:
              return "/".join(quote(part) for part in path.split("/"))

          def esc(value) -> str:
              return html.escape(str(value), quote=True)

          def last_commit_time(path: str) -> str:
              try:
                  return subprocess.check_output(
                      ["git", "log", "-1", "--format=%cI", "--", path],
                      text=True,
                      stderr=subprocess.DEVNULL,
                  ).strip()
              except Exception:
                  return ""

          def short_time(value: str) -> str:
              if not value:
                  return "更新时间未知"
              value = value.replace("T", " ").replace("Z", "")
              if "+" in value:
                  value = value.split("+", 1)[0]
              return "更新：" + value[:16].replace("-", "/")

          def raw_url(path: str) -> str:
              return RAW_BASE + quote_path(path)

          def github_url(path: str) -> str:
              return GH_BASE + quote_path(path)

          files = []
          grouped = []

          for category in CATEGORIES:
              folder = Path(category["key"])
              items = []

              if folder.exists():
                  for item in sorted(folder.rglob("*"), key=lambda p: p.as_posix().lower()):
                      if not item.is_file():
                          continue

                      path = item.as_posix()
                      updated = last_commit_time(path)
                      raw = raw_url(path)

                      data = {
                          "name": item.name,
                          "path": path,
                          "folder": category["key"],
                          "title": category["title"],
                          "icon": "IP" if item.suffix == ".mmdb" else category["icon"],
                          "updatedAt": updated,
                          "updatedText": short_time(updated),
                          "raw": raw,
                          "github": github_url(path),
                          "install": "surge:///install-module?url=" + raw if category["key"] == "SurgeModule" and item.name.endswith(".sgmodule") else "",
                      }

                      files.append(data)
                      items.append(data)

              grouped.append({
                  "title": category["title"],
                  "folder": category["key"],
                  "files": items,
              })

          def file_card(file):
              install = f'<a class="action" href="{esc(file["install"])}">安装</a>' if file["install"] else ""
              search = esc((file["name"] + " " + file["path"] + " " + file["title"]).lower())

              return f'''
                <article class="card file-card" data-folder="{esc(file['folder'])}" data-search="{search}">
                  <div class="card-head">
                    <span class="file-icon">{esc(file['icon'])}</span>
                    <span class="type-pill">{esc(file['title'])}</span>
                  </div>
                  <h3>{esc(file['name'])}</h3>
                  <p class="path">{esc(file['path'])}</p>
                  <p class="updated">{esc(file['updatedText'])}</p>
                  <div class="actions">
                    <a class="action primary-action" href="{esc(file['raw'])}">原始链接</a>
                    <a class="action" href="{esc(file['github'])}">仓库页</a>
                    {install}
                    <button class="action copy-btn" type="button" data-copy="{esc(file['raw'])}">复制</button>
                  </div>
                </article>'''

          def load_calendar_index():
              index_path = Path("Calendar/calendar-index.json")
              if index_path.exists():
                  try:
                      return json.loads(index_path.read_text(encoding="utf-8"))
                  except Exception:
                      pass

              calendar_dir = Path("Calendar")
              years = []

              if calendar_dir.exists():
                  for item in sorted(calendar_dir.glob("cn-mainland-*.ics")):
                      name = item.name
                      if name == "cn-mainland-latest.ics":
                          continue

                      year = None
                      stem = item.stem
                      parts = stem.split("-")
                      if parts and parts[-1].isdigit():
                          year = int(parts[-1])

                      if not year or year < 2026:
                          continue

                      path = item.as_posix()
                      years.append({
                          "year": year,
                          "title": f"{year} 年数据",
                          "name": f"中国大陆节假日与中国纪念日 {year}",
                          "path": path,
                          "raw": raw_url(path),
                          "webcal": raw_url(path).replace("https://", "webcal://", 1),
                          "count": 0,
                          "size": item.stat().st_size,
                      })

              latest_path = Path("Calendar/cn-mainland-latest.ics")
              latest = {
                  "title": "永久更新订阅",
                  "name": "中国大陆节假日与中国纪念日 最新订阅",
                  "path": latest_path.as_posix(),
                  "raw": raw_url(latest_path.as_posix()),
                  "webcal": raw_url(latest_path.as_posix()).replace("https://", "webcal://", 1),
                  "years": [item["year"] for item in years[-2:]],
                  "count": 0,
                  "size": latest_path.stat().st_size if latest_path.exists() else 0,
              }

              return {
                  "version": 1,
                  "startYear": 2026,
                  "targetYear": years[-1]["year"] if years else 2026,
                  "latest": latest,
                  "years": years,
              }

          calendar_index = load_calendar_index()
          latest_calendar = calendar_index.get("latest", {})
          yearly_calendars = [
              item for item in calendar_index.get("years", [])
              if int(item.get("year", 0)) >= 2026
          ]
          yearly_calendars.sort(key=lambda item: int(item.get("year", 0)))

          def calendar_latest_card(item):
              years = item.get("years") or []
              years_text = " / ".join(str(y) for y in years) if years else "自动滚动"
              raw = item.get("raw") or raw_url(item.get("path", "Calendar/cn-mainland-latest.ics"))
              webcal = item.get("webcal") or raw.replace("https://", "webcal://", 1)
              path = item.get("path", "Calendar/cn-mainland-latest.ics")
              github = github_url(path)
              count = item.get("count", 0)

              search = esc("calendar 日历 永久更新 最新订阅 中国大陆 节假日 调休 传统节日 节气 纪念日 ios".lower())

              return f'''
                <article class="card calendar-card latest-calendar" data-folder="Calendar" data-search="{search}">
                  <div class="card-head">
                    <span class="file-icon calendar-icon">C</span>
                    <span class="type-pill">永久更新</span>
                  </div>
                  <h3>永久更新订阅</h3>
                  <p class="cal-desc">包含去年与本年数据，订阅这个地址即可长期自动更新。当前覆盖：{esc(years_text)}。</p>
                  <div class="actions cal-actions">
                    <a class="action primary-action" href="{esc(webcal)}">iOS 订阅</a>
                    <a class="action" href="{esc(raw)}">Raw .ics</a>
                    <a class="action" href="{esc(github)}">仓库文件</a>
                    <button class="action copy-btn" type="button" data-copy="{esc(webcal)}">复制订阅</button>
                  </div>
                  <p class="updated cal-meta">事件数：{esc(count)} · 文件：{esc(path)}</p>
                </article>'''

          def calendar_year_card(item):
              year = int(item.get("year", 0))
              title = item.get("title") or f"{year} 年数据"
              raw = item.get("raw") or raw_url(item.get("path", f"Calendar/cn-mainland-{year}.ics"))
              webcal = item.get("webcal") or raw.replace("https://", "webcal://", 1)
              path = item.get("path", f"Calendar/cn-mainland-{year}.ics")
              github = github_url(path)
              count = item.get("count", 0)

              search = esc(f"calendar 日历 {year} 中国大陆 节假日 调休 传统节日 节气 纪念日 ios".lower())

              return f'''
                <article class="card calendar-card year-calendar" data-folder="Calendar" data-search="{search}">
                  <div class="card-head">
                    <span class="file-icon calendar-icon">C</span>
                    <span class="type-pill">{esc(year)}</span>
                  </div>
                  <h3>{esc(title)}</h3>
                  <p class="cal-desc">仅包含 {esc(year)} 年数据，适合单年订阅或备份。</p>
                  <div class="actions cal-actions">
                    <a class="action primary-action" href="{esc(webcal)}">iOS 订阅</a>
                    <a class="action" href="{esc(raw)}">Raw .ics</a>
                    <a class="action" href="{esc(github)}">仓库文件</a>
                    <button class="action copy-btn" type="button" data-copy="{esc(webcal)}">复制订阅</button>
                  </div>
                  <p class="updated cal-meta">事件数：{esc(count)} · 文件：{esc(path)}</p>
                </article>'''

          calendar_cards = []
          calendar_cards.append(calendar_latest_card(latest_calendar))
          calendar_cards.extend(calendar_year_card(item) for item in yearly_calendars)

          calendar_group = {
              "title": "日历",
              "folder": "Calendar",
              "files": [
                  latest_calendar,
                  *yearly_calendars,
              ],
          }
          grouped.append(calendar_group)

          cards_html = "\n".join(file_card(file) for file in files) + "\n" + "\n".join(calendar_cards)
          total = len(files)
          categories_json = esc(json.dumps(grouped, ensure_ascii=False, indent=2))

          index_template = Template(r'''<!doctype html>
          <html lang="zh-CN">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
            <meta name="theme-color" content="#f3ecdf" media="(prefers-color-scheme: light)">
            <meta name="theme-color" content="#090705" media="(prefers-color-scheme: dark)">
            <title>ProxyKit · 规则 / 脚本 / 模块 / 日历</title>
            <style>
              :root {
                color-scheme: light dark;

                --page: #f3ecdf;
                --page-top: #fff8ec;
                --page-bottom: #eee4d4;

                --text: #12100b;
                --muted: #766f62;
                --muted-soft: #9b927f;

                --hero: #fff9ef;
                --card: #fffaf0;
                --card-strong: #fffdf7;
                --field: #fff8ed;

                --control: #ebe4d8;
                --control-hover: #e4dbc9;
                --control-border: #d6cdbc;
                --control-text: #756545;

                --active-start: #eed690;
                --active-mid: #ca9438;
                --active-end: #86591f;
                --active-text: #120d05;

                --primary: #181207;
                --primary-hover: #241909;
                --primary-text: #fff0bd;

                --line: rgba(37, 30, 17, .10);
                --line-strong: rgba(37, 30, 17, .16);

                --shadow-page: 0 26px 70px rgba(70, 54, 21, .08);
                --shadow-card: 0 16px 42px rgba(70, 54, 21, .075);
                --shadow-card-hover: 0 24px 58px rgba(70, 54, 21, .12);
                --shadow-control: inset 0 1px 0 rgba(255, 255, 255, .34);

                --radius-hero: 34px;
                --radius-card: 28px;
                --radius-control: 999px;
              }

              @media (prefers-color-scheme: dark) {
                :root {
                  color-scheme: dark;

                  --page: #090705;
                  --page-top: #21180c;
                  --page-bottom: #050403;

                  --text: #f7efde;
                  --muted: #a99f8d;
                  --muted-soft: #817665;

                  --hero: #151109;
                  --card: #151109;
                  --card-strong: #1b150c;
                  --field: #100d08;

                  --control: #241b0f;
                  --control-hover: #2d2213;
                  --control-border: #4b3a20;
                  --control-text: #d7bd75;

                  --active-start: #dec47c;
                  --active-mid: #b98735;
                  --active-end: #76501e;
                  --active-text: #100b04;

                  --primary: linear-gradient(135deg, #dec47c 0%, #b98735 52%, #76501e 100%);
                  --primary-hover: linear-gradient(135deg, #e8ce87 0%, #c8943e 52%, #855a22 100%);
                  --primary-text: #100b04;

                  --line: rgba(232, 201, 122, .12);
                  --line-strong: rgba(232, 201, 122, .22);

                  --shadow-page: 0 30px 90px rgba(0, 0, 0, .30);
                  --shadow-card: 0 18px 48px rgba(0, 0, 0, .32);
                  --shadow-card-hover: 0 28px 74px rgba(0, 0, 0, .42);
                  --shadow-control: inset 0 1px 0 rgba(255, 238, 190, .06);
                }
              }

              * {
                box-sizing: border-box;
              }

              html {
                min-height: 100%;
                background: var(--page);
                text-rendering: geometricPrecision;
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
              }

              body {
                margin: 0;
                min-height: 100vh;
                color: var(--text);
                font-family:
                  -apple-system,
                  BlinkMacSystemFont,
                  "SF Pro Display",
                  "SF Pro Text",
                  "Segoe UI",
                  sans-serif;
                background:
                  radial-gradient(circle at 12% 0%, rgba(255, 255, 255, .58), transparent 28%),
                  radial-gradient(circle at 88% 2%, rgba(215, 178, 95, .20), transparent 32%),
                  linear-gradient(180deg, var(--page-top) 0%, var(--page) 42%, var(--page-bottom) 100%);
              }

              @media (prefers-color-scheme: dark) {
                body {
                  background:
                    radial-gradient(circle at 16% 0%, rgba(221, 188, 105, .10), transparent 30%),
                    radial-gradient(circle at 84% 0%, rgba(145, 92, 26, .13), transparent 34%),
                    linear-gradient(180deg, var(--page-top) 0%, var(--page) 46%, var(--page-bottom) 100%);
                }
              }

              a,
              button,
              input {
                -webkit-tap-highlight-color: transparent;
              }

              button,
              input {
                font: inherit;
              }

              .wrap {
                width: min(100%, 1080px);
                margin: 0 auto;
                padding: 34px 22px max(92px, calc(58px + env(safe-area-inset-bottom)));
              }

              .topbar {
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 16px;
                margin-bottom: 28px;
              }

              .brand {
                display: inline-flex;
                align-items: center;
                gap: 12px;
                padding: 9px 16px 9px 9px;
                border: 1px solid var(--line);
                border-radius: var(--radius-control);
                background: var(--card);
                color: var(--text);
                text-decoration: none;
                box-shadow:
                  var(--shadow-card),
                  var(--shadow-control);
              }

              .brand:visited {
                color: var(--text);
              }

              .logo {
                width: 40px;
                height: 40px;
                border-radius: 14px;
                display: grid;
                place-items: center;
                background: var(--primary);
                color: var(--primary-text);
                font-size: 14px;
                font-weight: 950;
                letter-spacing: -.055em;
                box-shadow:
                  0 12px 26px rgba(32, 24, 12, .18),
                  var(--shadow-control);
              }

              .brand b {
                font-size: 22px;
                line-height: 1;
                font-weight: 950;
                letter-spacing: -.055em;
              }

              .repo-link {
                color: var(--muted);
                text-decoration: none;
                font-size: 15px;
                font-weight: 760;
                padding: 10px 14px;
                border-radius: var(--radius-control);
              }

              .repo-link:hover {
                color: var(--text);
                background: var(--control);
              }

              .hero {
                position: relative;
                overflow: hidden;
                border: 1px solid var(--line);
                border-radius: var(--radius-hero);
                padding: clamp(38px, 7vw, 72px) 24px;
                margin-bottom: 38px;
                text-align: center;
                background:
                  radial-gradient(circle at 50% 30%, rgba(215, 178, 95, .16), transparent 44%),
                  var(--hero);
                box-shadow:
                  var(--shadow-page),
                  var(--shadow-control);
              }

              .hero::before {
                content: "";
                position: absolute;
                inset: 0;
                pointer-events: none;
                background:
                  linear-gradient(135deg, rgba(255, 255, 255, .28), transparent 44%, rgba(184, 135, 47, .05));
                opacity: .9;
              }

              .hero > * {
                position: relative;
                z-index: 1;
              }

              h1 {
                margin: 0;
                font-size: clamp(50px, 8vw, 92px);
                line-height: .92;
                font-weight: 950;
                letter-spacing: -.085em;
              }

              .hero-badges {
                display: flex;
                justify-content: center;
                flex-wrap: wrap;
                gap: 10px;
                margin-top: 28px;
              }

              .hero-badge,
              .tab,
              .type-pill,
              .file-icon,
              .action,
              .cal-chip {
                border: 1px solid var(--control-border);
                background: var(--control);
                color: var(--control-text);
                box-shadow: var(--shadow-control);
              }

              .hero-badge {
                display: inline-flex;
                align-items: center;
                gap: 8px;
                padding: 9px 14px;
                border-radius: var(--radius-control);
                font-size: 14px;
                font-weight: 820;
              }

              .dot {
                width: 9px;
                height: 9px;
                border-radius: 50%;
                background: var(--active-mid);
                box-shadow:
                  0 0 0 6px rgba(184, 135, 47, .12),
                  0 0 18px rgba(184, 135, 47, .20);
              }

              .section-title {
                margin: 0 0 20px;
                font-size: clamp(32px, 5vw, 48px);
                line-height: 1;
                font-weight: 950;
                letter-spacing: -.065em;
              }

              .tabs {
                display: flex;
                flex-wrap: wrap;
                gap: 10px;
                margin-bottom: 18px;
              }

              .tab {
                appearance: none;
                padding: 10px 16px;
                border-radius: var(--radius-control);
                font-size: 15px;
                font-weight: 880;
                cursor: pointer;
                transition:
                  transform .18s ease,
                  background .18s ease,
                  color .18s ease,
                  border-color .18s ease,
                  box-shadow .18s ease;
              }

              .tab:hover {
                transform: translateY(-1px);
                background: var(--control-hover);
                color: var(--text);
                border-color: var(--line-strong);
              }

              .tab.active {
                background:
                  linear-gradient(135deg, var(--active-start) 0%, var(--active-mid) 52%, var(--active-end) 100%);
                color: var(--active-text);
                border-color: rgba(184, 135, 47, .42);
                text-shadow: none;
                box-shadow:
                  0 14px 30px rgba(89, 58, 18, .15),
                  inset 0 1px 0 rgba(255, 255, 255, .22);
              }

              .search {
                position: relative;
                display: block;
                margin: 18px 0 18px;
              }

              .search input {
                width: 100%;
                border: 1px solid var(--line);
                border-radius: 24px;
                background: var(--field);
                color: var(--text);
                padding: 15px 18px 15px 48px;
                font-size: 16px;
                font-weight: 650;
                outline: none;
                box-shadow:
                  0 12px 30px rgba(70, 54, 21, .05),
                  var(--shadow-control);
              }

              .search input:focus {
                border-color: rgba(184, 135, 47, .38);
                box-shadow:
                  0 0 0 4px rgba(184, 135, 47, .10),
                  0 14px 32px rgba(70, 54, 21, .08),
                  var(--shadow-control);
              }

              .search input::placeholder {
                color: var(--muted-soft);
              }

              .search span {
                position: absolute;
                left: 20px;
                top: 50%;
                transform: translateY(-50%);
                color: var(--control-text);
                font-size: 18px;
                line-height: 1;
                pointer-events: none;
              }

              .count {
                margin: 0 0 20px;
                color: var(--muted);
                font-size: 15px;
                font-weight: 820;
              }

              .grid {
                display: grid;
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 18px;
              }

              .card {
                position: relative;
                overflow: hidden;
                border: 1px solid var(--line);
                border-radius: var(--radius-card);
                background: var(--card);
                box-shadow:
                  var(--shadow-card),
                  var(--shadow-control);
                padding: 22px;
                transition:
                  transform .20s ease,
                  border-color .20s ease,
                  box-shadow .20s ease,
                  background .20s ease;
              }

              .card::before {
                content: "";
                position: absolute;
                inset: 0;
                pointer-events: none;
                background:
                  linear-gradient(135deg, rgba(255, 255, 255, .18), transparent 45%, rgba(184, 135, 47, .035));
              }

              .card > * {
                position: relative;
                z-index: 1;
              }

              .card:hover {
                transform: translateY(-2px);
                background: var(--card-strong);
                border-color: var(--line-strong);
                box-shadow:
                  var(--shadow-card-hover),
                  var(--shadow-control);
              }

              .calendar-card {
                grid-column: 1 / -1;
                padding: clamp(24px, 4vw, 34px);
              }

              .year-calendar {
                grid-column: auto;
              }

              .latest-calendar {
                grid-column: 1 / -1;
              }

              .card-head {
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 12px;
                margin-bottom: 18px;
              }

              .file-icon {
                width: 44px;
                height: 44px;
                border-radius: 16px;
                display: grid;
                place-items: center;
                font-size: 15px;
                font-weight: 950;
              }

              .calendar-icon {
                color: var(--control-text);
              }

              .type-pill {
                padding: 7px 12px;
                border-radius: var(--radius-control);
                font-size: 13px;
                font-weight: 860;
              }

              h3 {
                margin: 0;
                color: var(--text);
                font-size: clamp(21px, 2.6vw, 28px);
                line-height: 1.14;
                font-weight: 920;
                letter-spacing: -.04em;
                word-break: break-word;
              }

              .latest-calendar h3 {
                max-width: 760px;
                font-size: clamp(25px, 3.6vw, 38px);
              }

              .path,
              .updated,
              .cal-desc,
              .cal-meta {
                color: var(--muted);
                font-size: 14px;
                font-weight: 700;
                line-height: 1.55;
              }

              .path {
                margin: 12px 0 5px;
                word-break: break-all;
              }

              .updated {
                margin: 0 0 18px;
              }

              .cal-desc {
                max-width: 760px;
                margin: 16px 0 20px;
                font-size: 15px;
              }

              .actions {
                display: flex;
                flex-wrap: wrap;
                gap: 10px;
                margin-top: 10px;
              }

              .action {
                appearance: none;
                padding: 9px 13px;
                border-radius: var(--radius-control);
                font-size: 14px;
                line-height: 1;
                font-weight: 870;
                text-decoration: none;
                cursor: pointer;
                transition:
                  transform .18s ease,
                  background .18s ease,
                  color .18s ease,
                  border-color .18s ease,
                  box-shadow .18s ease;
              }

              .action:hover {
                transform: translateY(-1px);
                background: var(--control-hover);
                color: var(--text);
                border-color: var(--line-strong);
              }

              .action.primary-action {
                background: var(--primary);
                color: var(--primary-text);
                border-color: rgba(184, 135, 47, .42);
                text-shadow: none;
                box-shadow:
                  0 12px 28px rgba(89, 58, 18, .16),
                  inset 0 1px 0 rgba(255, 255, 255, .18);
              }

              .action.primary-action:hover {
                background: var(--primary-hover);
                color: var(--primary-text);
              }

              .cal-chips {
                display: flex;
                flex-wrap: wrap;
                gap: 10px;
                margin: 8px 0 24px;
              }

              .cal-chip {
                border-radius: var(--radius-control);
                padding: 8px 12px;
                font-size: 14px;
                line-height: 1;
                font-weight: 850;
              }

              .cal-chip b {
                font-weight: 950;
              }

              @media (prefers-color-scheme: dark) {
                .hero::before,
                .card::before {
                  background:
                    linear-gradient(135deg, rgba(255, 238, 190, .045), transparent 45%, rgba(232, 201, 122, .025));
                }

                h1 {
                  color: #f8efda;
                  text-shadow: 0 18px 70px rgba(232, 201, 122, .10);
                }
              }

              .empty {
                display: none;
                text-align: center;
                color: var(--muted);
                font-size: 15px;
                font-weight: 820;
                padding: 34px;
              }

              .toast {
                position: fixed;
                left: 50%;
                bottom: max(26px, calc(18px + env(safe-area-inset-bottom)));
                z-index: 20;
                transform: translateX(-50%) translateY(20px);
                opacity: 0;
                pointer-events: none;
                border-radius: var(--radius-control);
                background: var(--primary);
                color: var(--primary-text);
                padding: 11px 16px;
                font-size: 14px;
                font-weight: 880;
                box-shadow:
                  0 18px 44px rgba(0, 0, 0, .20),
                  var(--shadow-control);
                transition:
                  opacity .2s ease,
                  transform .2s ease;
              }

              .toast.show {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
              }

              footer {
                margin-top: 38px;
                color: var(--muted);
                text-align: center;
                font-size: 13px;
                font-weight: 700;
              }

              @media (max-width: 820px) {
                .grid {
                  grid-template-columns: 1fr;
                }

                .year-calendar {
                  grid-column: 1 / -1;
                }
              }

              @media (max-width: 640px) {
                .wrap {
                  padding: 24px 14px max(118px, calc(78px + env(safe-area-inset-bottom)));
                }

                .topbar {
                  margin-bottom: 22px;
                }

                .brand {
                  padding: 8px 14px 8px 8px;
                }

                .brand b {
                  font-size: 21px;
                }

                .logo {
                  width: 38px;
                  height: 38px;
                  border-radius: 13px;
                  font-size: 13px;
                }

                .repo-link {
                  display: none;
                }

                .hero {
                  border-radius: 28px;
                  padding: 40px 16px;
                  margin-bottom: 32px;
                }

                h1 {
                  font-size: 48px;
                }

                .hero-badges {
                  gap: 9px;
                  margin-top: 22px;
                }

                .hero-badge {
                  padding: 8px 11px;
                  font-size: 13px;
                }

                .section-title {
                  margin-bottom: 18px;
                  font-size: 34px;
                }

                .tabs {
                  gap: 9px;
                }

                .tab {
                  padding: 10px 13px;
                  font-size: 14px;
                }

                .search input {
                  border-radius: 22px;
                  padding-top: 14px;
                  padding-bottom: 14px;
                  font-size: 15px;
                }

                .count {
                  font-size: 14px;
                }

                .card {
                  border-radius: 24px;
                  padding: 20px;
                }

                .file-icon {
                  width: 42px;
                  height: 42px;
                  border-radius: 15px;
                }

                h3 {
                  font-size: 22px;
                }

                .latest-calendar h3 {
                  font-size: 25px;
                }

                .path,
                .updated,
                .cal-desc,
                .cal-meta {
                  font-size: 14px;
                }

                .action {
                  padding: 9px 12px;
                  font-size: 13px;
                }
              }
            </style>
          </head>

          <body>
            <main class="wrap">
              <header class="topbar">
                <a class="brand" href="./" aria-label="ProxyKit 首页">
                  <span class="logo">PK</span>
                  <b>ProxyKit</b>
                </a>
                <a class="repo-link" href="https://github.com/$OWNER/$REPO">查看仓库</a>
              </header>

              <section class="hero">
                <h1>ProxyKit</h1>
                <div class="hero-badges">
                  <span class="hero-badge"><i class="dot"></i>适配：Surge</span>
                  <span class="hero-badge"><i class="dot"></i>更新：部分自动</span>
                </div>
              </section>

              <h2 class="section-title">文件列表</h2>

              <nav class="tabs" aria-label="文件分类">
                <button class="tab active" type="button" data-filter="all">全部</button>
                <button class="tab" type="button" data-filter="Rule">规则</button>
                <button class="tab" type="button" data-filter="Scripts">脚本</button>
                <button class="tab" type="button" data-filter="SurgeModule">模块</button>
                <button class="tab" type="button" data-filter="Calendar">日历</button>
              </nav>

              <label class="search">
                <span>⌕</span>
                <input id="search" type="search" placeholder="筛选当前列表…" autocomplete="off">
              </label>

              <p id="count" class="count">共 $total 项</p>

              <section id="grid" class="grid">$cards_html
              </section>

              <p id="empty" class="empty">没找到，换个关键词试试。</p>

              <footer>ProxyKit · 代理配置集合 · 适用于 GitHub Pages · 自动索引页面</footer>
            </main>

            <div id="toast" class="toast">已复制</div>

            <script id="files-json" type="application/json">$categories_json</script>

            <script>
              const tabs = Array.from(document.querySelectorAll('.tab'));
              const cards = Array.from(document.querySelectorAll('.card'));
              const input = document.querySelector('#search');
              const count = document.querySelector('#count');
              const empty = document.querySelector('#empty');
              const toast = document.querySelector('#toast');

              let active = 'all';

              function visibleForTab(card) {
                const folder = card.dataset.folder;
                if (active === 'all') return folder !== 'Calendar';
                return folder === active;
              }

              function refresh() {
                const q = input.value.trim().toLowerCase();
                let n = 0;

                for (const card of cards) {
                  const hitTab = visibleForTab(card);
                  const hitSearch = !q || (card.dataset.search || '').includes(q);
                  const show = hitTab && hitSearch;

                  card.style.display = show ? '' : 'none';

                  if (show) n++;
                }

                const label = active === 'Calendar' ? '个日历' : '项';
                count.textContent = '共 ' + n + ' ' + label;
                empty.style.display = n ? 'none' : 'block';
              }

              tabs.forEach(btn => {
                btn.addEventListener('click', () => {
                  active = btn.dataset.filter;
                  tabs.forEach(x => x.classList.toggle('active', x === btn));
                  input.value = '';
                  refresh();
                });
              });

              input.addEventListener('input', refresh);

              async function copyText(text) {
                try {
                  await navigator.clipboard.writeText(text);
                } catch (_) {
                  const ta = document.createElement('textarea');
                  ta.value = text;
                  document.body.appendChild(ta);
                  ta.select();
                  document.execCommand('copy');
                  ta.remove();
                }

                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 1300);
              }

              document.addEventListener('click', event => {
                const btn = event.target.closest('[data-copy]');
                if (!btn) return;
                copyText(btn.dataset.copy || '');
              });

              refresh();
            </script>
          </body>
          </html>''')

          index_html = index_template.safe_substitute(
              OWNER=OWNER,
              REPO=REPO,
              total=str(total),
              cards_html=cards_html,
              categories_json=categories_json,
          )

          out = Path("/tmp/proxykit-pages")
          out.mkdir(parents=True, exist_ok=True)
          out.joinpath("index.html").write_text(index_html, encoding="utf-8")
          out.joinpath("files.json").write_text(json.dumps(grouped, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          out.joinpath(".nojekyll").write_text("", encoding="utf-8")

          print(f"Rendered {total} normal files plus {len(calendar_cards)} calendar cards.")
          PY

      - name: Publish to gh-pages branch
        run: |
          set -euo pipefail

          git checkout --orphan gh-pages
          git rm -rf . >/dev/null 2>&1 || true

          cp -a /tmp/proxykit-pages/. .

          git add -A

          git commit -m "deploy: render static GitHub Pages" || {
            echo "No changes to deploy"
            exit 0
          }

          git push --force origin gh-pages