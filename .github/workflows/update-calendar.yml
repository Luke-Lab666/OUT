name: Update Calendar

on:
  schedule:
    # 每年 12 月 17 日 00:17 北京时间运行，生成明年日历
    - cron: "17 16 16 12 *"
  workflow_dispatch:
    inputs:
      year:
        description: "要生成的年份，留空则自动判断"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: update-calendar
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      INPUT_YEAR: ${{ github.event.inputs.year || '' }}

    steps:
      - name: Checkout repository without Node actions
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git init .
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --prune --no-tags origin "+refs/heads/main:refs/remotes/origin/main"
          git checkout -B main origin/main
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install calendar dependencies
        run: |
          set -euo pipefail
          python3 -m pip install --upgrade pip
          python3 -m pip install lunardate chinese-calendar pymupdf

      - name: Generate calendar files
        run: |
          set -euo pipefail
          mkdir -p Calendar

          python3 <<'PY'
          import hashlib
          import html
          import json
          import math
          import os
          import re
          import tempfile
          import urllib.request
          from datetime import date, datetime, timedelta, timezone
          from pathlib import Path
          from urllib.parse import quote, urljoin
          from zoneinfo import ZoneInfo

          import fitz
          from lunardate import LunarDate

          try:
              from chinese_calendar import get_holiday_detail, is_workday
          except Exception:
              get_holiday_detail = None
              is_workday = None

          START_YEAR = 2026
          TZ = ZoneInfo("Asia/Shanghai")
          CALENDAR_DIR = Path("Calendar")

          REPO_OWNER = "Luke-Lab666"
          REPO_NAME = "ProxyKit"
          BRANCH = "main"
          RAW_BASE = f"https://raw.githubusercontent.com/{REPO_OWNER}/{REPO_NAME}/{BRANCH}/"

          PMO_INDEX_URL = "https://www.pmo.cas.cn/xwdt2019/kpdt2019/202203/t20220309_6386774.html"

          HKO_SOLAR_TERM_URLS = [
              "https://www.hko.gov.hk/tc/gts/astronomy/Solar_Term.htm",
              "https://www.hko.gov.hk/sc/gts/astronomy/Solar_Term.htm",
          ]

          LATEST_FILE = CALENDAR_DIR / "cn-mainland-latest.ics"
          INDEX_FILE = CALENDAR_DIR / "calendar-index.json"

          SOLAR_TERM_CACHE = {}

          HOLIDAY_NAME_MAP = {
              "New Year's Day": "元旦",
              "New Year": "元旦",
              "NewYear": "元旦",
              "元旦": "元旦",

              "Spring Festival": "春节",
              "Chinese New Year": "春节",
              "春节": "春节",

              "Tomb-sweeping Day": "清明节",
              "Tomb Sweeping Day": "清明节",
              "Qingming Festival": "清明节",
              "Ching Ming Festival": "清明节",
              "清明": "清明节",
              "清明节": "清明节",

              "Labour Day": "劳动节",
              "Labor Day": "劳动节",
              "International Workers' Day": "劳动节",
              "May Day": "劳动节",
              "劳动节": "劳动节",

              "Dragon Boat Festival": "端午节",
              "Dragon Boat": "端午节",
              "端午": "端午节",
              "端午节": "端午节",

              "Mid-autumn Festival": "中秋节",
              "Mid-Autumn Festival": "中秋节",
              "Mid Autumn Festival": "中秋节",
              "中秋": "中秋节",
              "中秋节": "中秋节",

              "National Day": "国庆节",
