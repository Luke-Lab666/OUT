              ("中国人民抗日战争胜利纪念日", 9, 3),
              ("中国烈士纪念日", 9, 30),
              ("记者节", 11, 8),
              ("全国消防日", 11, 9),
              ("国家宪法日", 12, 4),
              ("南京大屠杀死难者国家公祭日", 12, 13),
          ]

          def normalize_holiday_name(value):
              if value is None:
                  return ""

              raw = str(value).strip()
              if not raw:
                  return ""

              raw = raw.replace("_", " ").replace("-", " ")
              raw = re.sub(r"\s+", " ", raw).strip()

              if raw in HOLIDAY_NAME_MAP:
                  return HOLIDAY_NAME_MAP[raw]

              lower_map = {k.lower(): v for k, v in HOLIDAY_NAME_MAP.items()}
              if raw.lower() in lower_map:
                  return lower_map[raw.lower()]

              lowered = raw.lower()

              if "new" in lowered and "year" in lowered:
                  return "元旦"
              if "spring" in lowered or "chinese new year" in lowered:
                  return "春节"
              if "tomb" in lowered or "qingming" in lowered or "ching ming" in lowered:
                  return "清明节"
              if "labour" in lowered or "labor" in lowered or "worker" in lowered or "may day" in lowered:
                  return "劳动节"
              if "dragon" in lowered:
                  return "端午节"
              if "mid" in lowered and "autumn" in lowered:
                  return "中秋节"
              if "national" in lowered:
                  return "国庆节"

              if re.search(r"[A-Za-z]", raw):
                  return ""

              return raw

          def normalize_solar_term_name(name):
              return SOLAR_TERM_NORMALIZE.get(name, name)

          def solar_term_variants(name):
              return SOLAR_TERM_NAME_VARIANTS.get(name, [name])

          def parse_target_year():
              raw = os.environ.get("INPUT_YEAR", "").strip()

              if raw:
                  year = int(raw)
              else:
                  now = datetime.now(TZ).date()
                  year = now.year + 1 if now.month == 12 and now.day >= 17 else now.year

              return max(year, START_YEAR)

          def date_range(start, end):
              current = date.fromisoformat(start)
              stop = date.fromisoformat(end)

              while current <= stop:
                  yield current
                  current += timedelta(days=1)

          def event_uid(name, day, kind):
              raw = f"{name}|{day.isoformat()}|{kind}"
              digest = hashlib.sha1(raw.encode("utf-8")).hexdigest()[:16]
              return f"{digest}@proxykit.calendar"

          def ics_escape(value):
              value = str(value)
              value = value.replace("\\", "\\\\")
              value = value.replace(";", "\\;")
              value = value.replace(",", "\\,")
              value = value.replace("\n", "\\n")
              return value

          def fold_ics_line(line):
              encoded = line.encode("utf-8")

              if len(encoded) <= 75:
                  return line

              out = []
              current = ""
              current_len = 0

              for ch in line:
                  size = len(ch.encode("utf-8"))

                  if current_len + size > 75:
                      out.append(current)
                      current = " " + ch
                      current_len = 1 + size
                  else:
                      current += ch
                      current_len += size

              if current:
                  out.append(current)

              return "\r\n".join(out)

          def add_event(events, summary, day, kind, description="", priority=50):
              if not isinstance(day, date):
                  raise TypeError("day must be date")

              summary = normalize_holiday_name(summary) if kind == "official_holiday" else str(summary).strip()

              if not summary:
                  return

              if re.search(r"[A-Za-z]", summary):
                  return

              if day.year < START_YEAR:
                  return

              key = (day.isoformat(), summary)
              existing = events.get(key)

              if existing and existing["priority"] <= priority:
                  return

              events[key] = {
                  "summary": summary,
                  "date": day,
                  "kind": kind,
                  "description": description,
                  "priority": priority,
              }

          def read_json_file(path):
              try:
                  if path.exists():
                      return json.loads(path.read_text(encoding="utf-8"))
              except Exception as error:
                  print(f"JSON read failed: {path} / {error}")

              return None

          def normalize_official_plan_shape(data, year):
              if not isinstance(data, dict):
                  return None

              if str(year) in data and isinstance(data[str(year)], dict):
                  return data[str(year)]

              if "holidays" in data or "workdays" in data:
                  return data

              return None

          def load_official_holiday_plan(year):
              candidates = [
                  CALENDAR_DIR / f"official-holidays-{year}.json",
                  CALENDAR_DIR / "official-holidays.json",
              ]

              for path in candidates:
                  data = read_json_file(path)
                  plan = normalize_official_plan_shape(data, year)

                  if plan:
                      print(f"Official holiday plan loaded from {path}")
                      return plan, path.as_posix()

              return None, ""

          def iter_holiday_ranges(plan):
              holidays = plan.get("holidays", [])

              if not isinstance(holidays, list):
                  return

              for item in holidays:
                  name = ""
                  start = ""
                  end = ""

                  if isinstance(item, dict):
                      name = item.get("name") or item.get("title") or item.get("summary") or ""
                      start = item.get("start") or item.get("from") or item.get("date") or ""
                      end = item.get("end") or item.get("to") or item.get("date") or start
                  elif isinstance(item, (list, tuple)):
                      if len(item) >= 3:
                          name, start, end = item[0], item[1], item[2]
                      elif len(item) == 2:
                          name, start = item[0], item[1]
                          end = start

                  name = normalize_holiday_name(name)

                  if not name or not start:
                      continue

                  try:
                      start_day = date.fromisoformat(str(start))
                      end_day = date.fromisoformat(str(end))
                  except Exception:
                      continue

                  if end_day < start_day:
                      start_day, end_day = end_day, start_day

                  yield name, start_day, end_day

          def iter_workdays(plan):
              workdays = plan.get("workdays", [])

              if not isinstance(workdays, list):
                  return

              for item in workdays:
                  raw_day = item if isinstance(item, str) else item.get("date") if isinstance(item, dict) else ""

                  if not raw_day:
                      continue

                  try:
                      yield date.fromisoformat(str(raw_day))
                  except Exception:
                      continue

          def build_holiday_events_from_json(year, events):
              plan, source_file = load_official_holiday_plan(year)

              if not plan:
                  return False

              source = plan.get("source") or plan.get("sourceName") or "国务院办公厅节假日安排"
              added = False

              for name, start_day, end_day in iter_holiday_ranges(plan):
                  current = start_day

                  while current <= end_day:
                      if current.year == year:
                          add_event(
                              events,
                              name,
                              current,
                              "official_holiday",
                              f"类型：法定节假日。数据源：{source}。配置文件：{source_file}。",
                              10,
                          )
                          added = True

                      current += timedelta(days=1)

              for day in iter_workdays(plan):
                  if day.year != year:
                      continue

                  add_event(
                      events,
                      "调休上班",
                      day,
                      "adjusted_workday",
                      f"类型：调休上班日。数据源：{source}。配置文件：{source_file}。",
                      11,
                  )
                  added = True

              return added

          def build_holiday_events_from_chinese_calendar(year, events):
              if not get_holiday_detail or not is_workday:
                  return False

              found = False
              current = date(year, 1, 1)
              stop = date(year, 12, 31)

              while current <= stop:
                  try:
                      _is_holiday_flag, holiday_name = get_holiday_detail(current)
                  except Exception:
                      holiday_name = None

                  holiday_name = normalize_holiday_name(holiday_name)

                  if holiday_name:
                      found = True
                      add_event(
                          events,
                          holiday_name,
                          current,
                          "official_holiday",
                          "类型：法定节假日。数据源：chinese-calendar 维护的国务院办公厅节假日安排数据。",
                          10,
                      )

                  try:
                      workday_flag = is_workday(current)
                  except Exception:
                      workday_flag = False

                  if workday_flag and current.weekday() >= 5:
                      found = True
                      add_event(
                          events,
                          "调休上班",
                          current,
                          "adjusted_workday",
                          "类型：调休上班日。数据源：chinese-calendar 维护的国务院办公厅节假日安排数据。",
                          11,
                      )

                  current += timedelta(days=1)

              return found

          def build_holiday_events(year, events):
              if build_holiday_events_from_json(year, events):
                  return

              if build_holiday_events_from_chinese_calendar(year, events):
                  return

              print(f"No official holiday data found for {year}; official holidays and adjusted workdays are skipped.")

          def build_lunar_events(year, events):
              for lunar_year in (year - 1, year, year + 1):
                  for name, month, day in LUNAR_FESTIVALS:
                      try:
                          solar_day = LunarDate(lunar_year, month, day).toSolarDate()
                      except Exception:
                          continue

                      if solar_day.year == year:
                          add_event(
                              events,
                              name,
                              solar_day,
                              "traditional",
                              "类型：中国传统节日。依据农历规则计算。",
                              30,
                          )

                  try:
                      next_spring = LunarDate(lunar_year + 1, 1, 1).toSolarDate()
                      eve = next_spring - timedelta(days=1)

                      if eve.year == year:
                          add_event(
                              events,
                              "除夕",
                              eve,
                              "traditional",
                              "类型：中国传统节日。依据农历规则计算。",
                              30,
                          )
                  except Exception:
                      pass

          def build_solar_memorial_events(year, events):
              for name, month, day in SOLAR_MEMORIALS:
                  try:
                      solar_day = date(year, month, day)
                  except ValueError:
                      continue

                  add_event(
                      events,
                      name,
                      solar_day,
                      "memorial",
                      "类型：中国常用纪念日。依据固定公历日期生成。",
                      40,
                  )

          def decode_html(content):
              for encoding in ("utf-8", "gb18030", "gbk", "big5", "big5hkscs"):
                  try:
                      return content.decode(encoding)
                  except Exception:
                      pass

              return content.decode("utf-8", errors="ignore")

          def fetch_url(url, timeout=35):
              if url.startswith("www."):
                  url = "https://" + url

              req = urllib.request.Request(
                  url,
                  headers={
                      "User-Agent": "Mozilla/5.0 ProxyKit Calendar Generator",
                      "Accept-Language": "zh-CN,zh;q=0.9,zh-HK;q=0.8,en;q=0.7",
                  },
              )

              with urllib.request.urlopen(req, timeout=timeout) as response:
                  content = response.read()
                  final_url = response.geturl()
                  content_type = response.headers.get("Content-Type", "")

              return content, final_url, content_type

          def strip_tags(value):
              value = re.sub(r"<script\b[^>]*>.*?</script>", " ", value, flags=re.I | re.S)
              value = re.sub(r"<style\b[^>]*>.*?</style>", " ", value, flags=re.I | re.S)
              value = re.sub(r"<[^>]+>", " ", value)
              value = html.unescape(value)
              value = re.sub(r"\s+", " ", value).strip()
              return value

          def html_to_text_keep_script(value):
              value = re.sub(r"<!--.*?-->", " ", value, flags=re.S)
              value = re.sub(r"<[^>]+>", " ", value)
              value = html.unescape(value)
              value = re.sub(r"\s+", " ", value).strip()
              return value

          def parse_dt_value(value, year):
              value = str(value).strip()
              value = value.replace("年", "-").replace("月", "-").replace("日", "")
              value = value.replace("/", "-")
              value = re.sub(r"\s+", " ", value)

              patterns = [
                  r"^(?P<y>\d{4})-(?P<m>\d{1,2})-(?P<d>\d{1,2}) (?P<h>\d{1,2}):(?P<min>\d{2})$",
                  r"^(?P<m>\d{1,2})-(?P<d>\d{1,2}) (?P<h>\d{1,2}):(?P<min>\d{2})$",
                  r"^(?P<m>\d{1,2}) (?P<d>\d{1,2}) (?P<h>\d{1,2}):(?P<min>\d{2})$",
              ]

              for pattern in patterns:
                  match = re.match(pattern, value)

                  if not match:
                      continue

                  y = int(match.groupdict().get("y") or year)
                  m = int(match.group("m"))
                  d = int(match.group("d"))
                  h = int(match.group("h"))
                  minute = int(match.group("min"))

                  return datetime(y, m, d, h, minute, tzinfo=TZ)

              raise ValueError(f"Unsupported datetime format: {value}")

          def normalize_text(text):
              text = html.unescape(text)
              text = text.replace("︰", ":")
              text = text.replace("：", ":")
              text = text.replace("．", ".")
              text = text.replace("－", "-")
              text = text.replace("—", "-")
              text = text.replace("／", "/")
              text = text.replace("\\u6708", " 月 ")
              text = text.replace("\\u65e5", " 日 ")
              text = text.replace("\\u6642", " 时 ")
              text = text.replace("\\u65f6", " 时 ")
              text = text.replace("\\u5206", " 分 ")

              for ch in [",", "，", "、", '"', "'", "[", "]", "{", "}", "(", ")", ";", "|", "\u00a0"]:
                  text = text.replace(ch, " ")

              text = text.replace("年", " 年 ")
              text = text.replace("月", " 月 ")
              text = text.replace("日", " 日 ")
              text = text.replace("時", " 时 ")
              text = text.replace("时", " 时 ")
              text = text.replace("分", " 分 ")

              text = text.replace("驚蟄", "惊蛰")
              text = text.replace("穀雨", "谷雨")
              text = text.replace("小滿", "小满")
              text = text.replace("芒種", "芒种")
              text = text.replace("處暑", "处暑")
              text = text.replace("節氣", "节气")

              text = re.sub(r"[ \t\r\f\v]+", " ", text)
              text = re.sub(r"\n+", "\n", text)

              return text

          def parse_solar_terms_from_text(text, year, require_full=True):
              text = normalize_text(text)
              compact = re.sub(r"\s+", " ", text)

              result = {}

              for name, _angle in SOLAR_TERMS:
                  expected_months = SOLAR_TERM_EXPECTED_MONTHS.get(name, set())
                  found = None

                  for variant in solar_term_variants(name):
                      variant = normalize_solar_term_name(variant)

                      patterns = [
                          rf"{re.escape(variant)}\s+(\d{{1,2}})\s+月\s+(\d{{1,2}})\s+日\s+(\d{{1,2}}):(\d{{2}})",
                          rf"{re.escape(variant)}\s+(\d{{1,2}})\s+(\d{{1,2}})\s+(\d{{1,2}}):(\d{{2}})",
                          rf"{re.escape(variant)}\s*(?:{year}\s*年\s*)?(\d{{1,2}})\s*月\s*(\d{{1,2}})\s*日\s*(\d{{1,2}})\s*(?:时|:)\s*(\d{{1,2}})\s*(?:分)?",
                          rf"(?:{year}\s*年\s*)?(\d{{1,2}})\s*月\s*(\d{{1,2}})\s*日\s*(\d{{1,2}})\s*(?:时|:)\s*(\d{{1,2}})\s*(?:分)?\s*{re.escape(variant)}",
                          rf"(\d{{1,2}})/(\d{{1,2}})\s+(\d{{1,2}}):(\d{{2}})\s+{re.escape(variant)}",
                          rf"(?:\d{{1,3}}|360)\s+(\d{{1,2}})/(\d{{1,2}})\s+(\d{{1,2}}):(\d{{2}})\s+{re.escape(variant)}",
                          rf"{re.escape(variant)}\s*(\d{{1,2}})\s*日\s*(\d{{1,2}})\s*(?:时|:)\s*(\d{{1,2}})\s*(?:分)?",
                      ]

                      for idx, pattern in enumerate(patterns):
                          for match in re.finditer(pattern, compact):
                              try:
                                  if idx in (0, 1, 2, 3):
                                      month = int(match.group(1))
                                      day = int(match.group(2))
                                      hour = int(match.group(3))
                                      minute = int(match.group(4))
                                  elif idx in (4, 5):
                                      day = int(match.group(1))
                                      month = int(match.group(2))
                                      hour = int(match.group(3))
                                      minute = int(match.group(4))
                                  else:
                                      month_candidates = sorted(expected_months)

                                      if not month_candidates:
                                          continue

                                      month = month_candidates[0]
                                      day = int(match.group(1))
                                      hour = int(match.group(2))
                                      minute = int(match.group(3))

                                  if expected_months and month not in expected_months:
                                      continue

                                  found = datetime(year, month, day, hour, minute, tzinfo=TZ)
                                  break
                              except ValueError:
                                  continue

                          if found:
                              break

                      if found:
                          break

                  if found:
                      result[name] = found

              if len(result) == 24:
                  return result

              missing = [name for name, _angle in SOLAR_TERMS if name not in result]
              print(f"Solar terms parsed partially for {year}: {len(result)}/24, missing={missing}")

              if require_full:
                  return None

              return result if result else None

          def load_pmo_solar_terms_from_json(year):
              path = CALENDAR_DIR / "solar-terms-pmo.json"

              if not path.exists():
                  return None

              try:
                  data = json.loads(path.read_text(encoding="utf-8"))
                  year_data = data.get(str(year))

                  if not year_data:
                      return None

                  result = {}

                  for name, _angle in SOLAR_TERMS:
                      raw = year_data.get(name)

                      if not raw:
                          return None

                      result[name] = parse_dt_value(raw, year)

                  if len(result) == 24:
                      return result

                  return None
              except Exception:
                  return None

          def save_pdf_bytes(content, year, label, prefix):
              if not content.startswith(b"%PDF"):
                  return None

              digest = hashlib.sha1(label.encode("utf-8")).hexdigest()[:10]
              path = Path(tempfile.gettempdir()) / f"{prefix}-{year}-{digest}.pdf"
              path.write_bytes(content)

              return path

          def extract_pdf_text(path):
              try:
                  doc = fitz.open(str(path))
                  chunks = []

                  for page in doc:
                      text = page.get_text("text") or ""

                      if text:
                          chunks.append(text)

                  doc.close()
                  return "\n".join(chunks)
              except Exception as error:
                  print(f"PDF text extraction failed: {path} / {error}")
                  return ""

          def score_pmo_link(url, label, year):
              haystack = f"{url} {label}"
              lower = haystack.lower()
              score = 0

              if ".pdf" in lower:
                  score += 40

              if str(year) in haystack:
                  score += 120

              for word in ("日历资料", "中國天文年曆", "中国天文年历", "历书", "曆書", "年历", "年曆", "节气", "節氣"):
                  if word in haystack:
                      score += 35

              if "1900" in haystack and str(year) not in haystack:
                  score -= 80

              if "空间站" in haystack or "過境預報" in haystack or "过境预报" in haystack:
                  score -= 100

              return score

          def extract_pmo_links_from_html(html_text, base_url, year):
              links = []

              anchor_pattern = re.compile(
                  r"<a\b[^>]*?href\s*=\s*['\"]([^'\"]+)['\"][^>]*>(.*?)</a>",
                  flags=re.I | re.S,
              )

              for match in anchor_pattern.finditer(html_text):
                  href = html.unescape(match.group(1)).strip()
                  label = strip_tags(match.group(2))

                  if not href or href.startswith("#") or href.lower().startswith("javascript:"):
                      continue

                  absolute = urljoin(base_url, href)
                  score = score_pmo_link(absolute, label, year)

                  if ".pdf" in absolute.lower() or score >= 120:
                      links.append((score, absolute, label))

              href_pattern = re.compile(
                  r"href\s*=\s*['\"]([^'\"]+\.pdf(?:\?[^'\"]*)?)['\"]",
                  flags=re.I,
              )

              for match in href_pattern.finditer(html_text):
                  href = html.unescape(match.group(1)).strip()
                  absolute = urljoin(base_url, href)
                  score = score_pmo_link(absolute, absolute, year)
                  links.append((score, absolute, absolute))

              dedup = {}

              for score, url, label in links:
                  if url not in dedup or score > dedup[url][0]:
                      dedup[url] = (score, url, label)

              result = sorted(dedup.values(), key=lambda item: item[0], reverse=True)
              result = [item for item in result if item[0] > 0]

              return result[:15]

          def pmo_source_urls_from_config(year):
              urls = [PMO_INDEX_URL]
              source_file = CALENDAR_DIR / "pmo-almanac-sources.json"

              if not source_file.exists():
                  return urls

              try:
                  data = json.loads(source_file.read_text(encoding="utf-8"))
              except Exception:
                  return urls

              def add_url(value):
                  if isinstance(value, str) and value.strip():
                      urls.append(value.strip())
                  elif isinstance(value, list):
                      for item in value:
                          add_url(item)

              add_url(data.get("source_pages"))
              add_url(data.get("sources"))
              add_url(data.get("pdfs"))
              add_url(data.get(str(year)))

              deduped = []
              seen = set()

              for url in urls:
                  if url.startswith("www."):
                      url = "https://" + url

                  if url not in seen:
                      deduped.append(url)
                      seen.add(url)

              return deduped

          def local_pmo_pdf_candidates(year):
              names = [
                  f"pmo-almanac-{year}.pdf",
                  f"pmo-{year}.pdf",
                  f"solar-terms-pmo-{year}.pdf",
                  f"chinese-almanac-{year}.pdf",
                  f"中国天文年历{year}.pdf",
                  f"{year}中国天文年历.pdf",
                  f"{year}日历资料.pdf",
                  f"日历资料{year}.pdf",
                  f"{year}.pdf",
              ]

              candidates = []

              for name in names:
                  path = CALENDAR_DIR / name

                  if path.exists():
                      candidates.append(path)

              for path in sorted(CALENDAR_DIR.glob("*.pdf")):
                  if str(year) in path.name and path not in candidates:
                      candidates.append(path)

              return candidates

          def download_pmo_pdf_candidates(year):
              paths = []

              for url in pmo_source_urls_from_config(year):
                  try:
                      content, final_url, _content_type = fetch_url(url)
                  except Exception as error:
                      print(f"PMO source fetch failed: {url} / {error}")
                      continue

                  direct_pdf = save_pdf_bytes(content, year, final_url, "pmo-almanac")

                  if direct_pdf:
                      print(f"PMO PDF downloaded directly: {final_url}")
                      paths.append(direct_pdf)
                      continue

                  text = decode_html(content)
                  links = extract_pmo_links_from_html(text, final_url, year)

                  if not links:
                      print(f"PMO index fetched but no candidate PDF link matched: {final_url}")
                      continue

                  print(f"PMO index matched {len(links)} candidate links for {year}")

                  for score, pdf_url, label in links:
                      try:
                          pdf_content, pdf_final_url, _pdf_content_type = fetch_url(pdf_url)
                          pdf_path = save_pdf_bytes(pdf_content, year, pdf_final_url, "pmo-almanac")

                          if pdf_path:
                              print(f"PMO candidate PDF downloaded: score={score}, label={label}, url={pdf_final_url}")
                              paths.append(pdf_path)
                      except Exception as error:
                          print(f"PMO candidate PDF download failed: {pdf_url} / {error}")

              deduped = []
              seen = set()

              for path in paths:
                  key = str(path)

                  if key not in seen:
                      deduped.append(path)
                      seen.add(key)

              return deduped

          def load_pmo_solar_terms_from_pdf(year):
              candidates = local_pmo_pdf_candidates(year) + download_pmo_pdf_candidates(year)

              if not candidates:
                  print(f"No PMO PDF candidates found for {year}")
                  return None

              for path in candidates:
                  text = extract_pdf_text(path)

                  if not text.strip():
                      print(f"PMO PDF has no extractable text, maybe scanned PDF: {path}")
                      continue

                  parsed = parse_solar_terms_from_text(text, year, require_full=True)

                  if parsed and len(parsed) == 24:
                      print(f"PMO solar terms parsed from PDF: {path}")
                      return parsed

                  print(f"PMO PDF found but solar terms not fully parsed: {path}")

              return None

          def load_pmo_solar_terms(year):
              from_json = load_pmo_solar_terms_from_json(year)

              if from_json and len(from_json) == 24:
                  print(f"PMO solar terms loaded from JSON for {year}")
                  return from_json

              from_pdf = load_pmo_solar_terms_from_pdf(year)

              if from_pdf and len(from_pdf) == 24:
                  return from_pdf

              return None

          def fetch_hko_solar_terms_from_page(year):
              for url in HKO_SOLAR_TERM_URLS:
                  try:
                      content, final_url, _content_type = fetch_url(url, timeout=25)
                      text = decode_html(content)
                  except Exception as error:
                      print(f"HKO Solar_Term page fetch failed: {url} / {error}")
                      continue

                  combined = "\n".join([
                      text,
                      html_to_text_keep_script(text),
                      strip_tags(text),
                  ])

                  parsed = parse_solar_terms_from_text(combined, year, require_full=True)

                  if parsed and len(parsed) == 24:
                      print(f"HKO solar terms loaded from page: {final_url}")
                      return parsed

                  print(f"HKO Solar_Term page parsed incomplete from {final_url}")

              return None

          def fetch_hko_solar_terms(year):
              full = fetch_hko_solar_terms_from_page(year)

              if full and len(full) == 24:
                  return full, "香港天文台", ""

              print(f"HKO Solar_Term page did not return complete 24 solar terms for {year}; ignored because backup source must be complete")

              return None, "", ""

          def julian_day(dt_utc):
              timestamp = dt_utc.timestamp()
              return 2440587.5 + timestamp / 86400.0

          def from_julian_day(jd):
              timestamp = (jd - 2440587.5) * 86400.0
              return datetime.fromtimestamp(timestamp, tz=timezone.utc)

          def normalize_angle(angle):
              return angle % 360.0

          def sun_longitude_ephem(jd):
              dt_utc = from_julian_day(jd)
              ephem_date = ephem.Date(dt_utc.replace(tzinfo=None))
              sun = ephem.Sun(ephem_date)
              ecliptic = ephem.Ecliptic(sun)
              return normalize_angle(math.degrees(float(ecliptic.lon)))

          def sun_longitude_simple(jd):
              t = (jd - 2451545.0) / 36525.0
              l0 = normalize_angle(280.46646 + 36000.76983 * t + 0.0003032 * t * t)
              m = 357.52911 + 35999.05029 * t - 0.0001537 * t * t
              m_rad = math.radians(normalize_angle(m))
              c = (
                  (1.914602 - 0.004817 * t - 0.000014 * t * t) * math.sin(m_rad)
                  + (0.019993 - 0.000101 * t) * math.sin(2 * m_rad)
                  + 0.000289 * math.sin(3 * m_rad)
              )
              true_long = l0 + c
              omega = 125.04 - 1934.136 * t
              apparent = true_long - 0.00569 - 0.00478 * math.sin(math.radians(omega))
              return normalize_angle(apparent)

          def sun_longitude_unwrapped(jd):
              value = sun_longitude_ephem(jd) if ephem is not None else sun_longitude_simple(jd)

              if value < 280:
                  value += 360

              return value

          def local_algorithm_solar_terms(year):
              start = datetime(year, 1, 1, 0, 0, tzinfo=timezone.utc)
              end = datetime(year, 12, 29, 12, 0, tzinfo=timezone.utc)
              low_base = julian_day(start)
              high_base = julian_day(end)

              result = {}

              for name, target in SOLAR_TERMS:
                  low = low_base
                  high = high_base

                  for _ in range(90):
                      mid = (low + high) / 2
                      value = sun_longitude_unwrapped(mid)

                      if value < target:
                          low = mid
                      else:
                          high = mid

                  utc_dt = from_julian_day((low + high) / 2)
                  beijing_dt = utc_dt.astimezone(TZ)
                  beijing_dt = beijing_dt.replace(second=0, microsecond=0)
                  result[name] = beijing_dt

              return result

          def load_solar_terms(year):
              if year in SOLAR_TERM_CACHE:
                  return SOLAR_TERM_CACHE[year]

              pmo = load_pmo_solar_terms(year)

              if pmo and len(pmo) == 24:
                  value = (pmo, "中国科学院紫金山天文台 / 中国天文年历", "")
                  SOLAR_TERM_CACHE[year] = value
                  return value

              hko, hko_source, hko_note = fetch_hko_solar_terms(year)

              if hko and len(hko) == 24:
                  note = hko_note or "紫金山天文台数据：暂未抓取到；当前采用香港天文台备源。"
                  value = (hko, hko_source, note)
                  SOLAR_TERM_CACHE[year] = value
                  return value

              local = local_algorithm_solar_terms(year)
              note = "紫金山天文台数据：暂未抓取到；香港天文台数据：暂未抓取到；当前采用本地天文算法兜底，时间已转换为北京时间。"
              value = (local, "本地天文算法", note)
              SOLAR_TERM_CACHE[year] = value
              return value

          def build_solar_term_events(year, events):
              terms, source, note = load_solar_terms(year)

              for name, _angle in SOLAR_TERMS:
                  dt = terms.get(name)

                  if not dt:
                      continue

                  desc = f"类型：二十四节气。交接时间：{dt.strftime('%H:%M')}，北京时间。数据源：{source}。"

                  if note:
                      desc += f" {note}"

                  add_event(
                      events,
                      name,
                      dt.date(),
                      "solar_term",
                      desc,
                      20,
                  )

          def build_year_events(year):
              events = {}
              build_holiday_events(year, events)
              build_lunar_events(year, events)
              build_solar_memorial_events(year, events)
              build_solar_term_events(year, events)
              return sorted(events.values(), key=lambda item: (item["date"], item["priority"], item["summary"], item["kind"]))

          def render_ics(events, calendar_name):
              now = datetime.now(timezone.utc).strftime("%Y%m%dT%H%M%SZ")
              lines = [
                  "BEGIN:VCALENDAR",
                  "VERSION:2.0",
                  "PRODID:-//Luke-Lab666//ProxyKit Calendar//CN",
                  "CALSCALE:GREGORIAN",
                  "METHOD:PUBLISH",
                  f"X-WR-CALNAME:{ics_escape(calendar_name)}",
                  "X-WR-TIMEZONE:Asia/Shanghai",
                  "REFRESH-INTERVAL;VALUE=DURATION:P1D",
                  "X-PUBLISHED-TTL:PT24H",
              ]

              for event in events:
                  day = event["date"]
                  end_day = day + timedelta(days=1)
                  lines.extend([
                      "BEGIN:VEVENT",
                      f"UID:{event_uid(event['summary'], day, event['kind'])}",
                      f"DTSTAMP:{now}",
                      f"DTSTART;VALUE=DATE:{day.strftime('%Y%m%d')}",
                      f"DTEND;VALUE=DATE:{end_day.strftime('%Y%m%d')}",
                      f"SUMMARY:{ics_escape(event['summary'])}",
                      f"DESCRIPTION:{ics_escape(event['description'])}",
                      "TRANSP:TRANSPARENT",
                      "END:VEVENT",
                  ])

              lines.append("END:VCALENDAR")
              return "\r\n".join(fold_ics_line(line) for line in lines) + "\r\n"

          def raw_url(path):
              return RAW_BASE + "/".join(quote(part) for part in path.as_posix().split("/"))

          def webcal_url(path):
              return raw_url(path).replace("https://", "webcal://", 1)

          def file_size(path):
              try:
                  return path.stat().st_size
              except Exception:
                  return 0

          target_year = parse_target_year()
          rolling_years = list(range(max(START_YEAR, target_year - 1), target_year + 1))

          for old_file in CALENDAR_DIR.glob("cn-mainland-*.ics"):
              old_file.unlink()

          year_index = []

          for year in range(START_YEAR, target_year + 1):
              events = build_year_events(year)
              path = CALENDAR_DIR / f"cn-mainland-{year}.ics"
              path.write_text(render_ics(events, f"中国大陆节假日与中国纪念日 {year}"), encoding="utf-8")
              year_index.append({
                  "year": year,
                  "title": f"{year} 年数据",
                  "name": f"中国大陆节假日与中国纪念日 {year}",
                  "path": path.as_posix(),
                  "raw": raw_url(path),
                  "webcal": webcal_url(path),
                  "count": len(events),
                  "size": file_size(path),
              })

          latest_events = []

          for year in rolling_years:
              latest_events.extend(build_year_events(year))

          LATEST_FILE.write_text(
              render_ics(
                  latest_events,
                  f"中国大陆节假日与中国纪念日 最新订阅 {rolling_years[0]}-{rolling_years[-1]}",
              ),
              encoding="utf-8",
          )

          index = {
              "version": 1,
              "startYear": START_YEAR,
              "targetYear": target_year,
              "updatedAt": datetime.now(TZ).isoformat(timespec="seconds"),
              "latest": {
                  "title": "永久更新订阅",
                  "name": f"中国大陆节假日与中国纪念日 最新订阅 {rolling_years[0]}-{rolling_years[-1]}",
                  "path": LATEST_FILE.as_posix(),
                  "raw": raw_url(LATEST_FILE),
                  "webcal": webcal_url(LATEST_FILE),
                  "years": rolling_years,
                  "count": len(latest_events),
                  "size": file_size(LATEST_FILE),
              },
              "years": year_index,
          }

          INDEX_FILE.write_text(json.dumps(index, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")

          print(f"Generated calendar target year: {target_year}")
          print(f"Generated latest rolling years: {rolling_years[0]}-{rolling_years[-1]}")
          print(f"Generated files: {LATEST_FILE.as_posix()}, {INDEX_FILE.as_posix()}")
          PY

      - name: Commit calendar update
        run: |
          set -euo pipefail

          git add Calendar

          if git diff --cached --quiet; then
            echo "No calendar changes"
            exit 0
          fi

          git commit -m "calendar: update mainland calendar"
          git push origin main
