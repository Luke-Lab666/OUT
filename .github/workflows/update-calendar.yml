              ("小暑", 465),
              ("大暑", 480),
              ("立秋", 495),
              ("处暑", 510),
              ("白露", 525),
              ("秋分", 540),
              ("寒露", 555),
              ("霜降", 570),
              ("立冬", 585),
              ("小雪", 600),
